<!DOCTYPE html>
<html>
<head>
  <title>Bulk STK Push</title>
</head>
<body>
  <h2>Bulk STK Push (MegaPay)</h2>

  <textarea id="numbers" placeholder="Enter numbers, one per line"></textarea><br>
  <input type="number" id="amount" placeholder="Amount"><br>
  <button onclick="send()">Send</button>

  <pre id="result"></pre>

<script>
async function send() {
  const numbers = document.getElementById('numbers').value
    .split('\n')
    .map(n => n.trim())
    .filter(n => n);

  const amount = document.getElementById('amount').value;

  const res = await fetch('/send-bulk', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ numbers, amount })
  });

  const data = await res.json();
  document.getElementById('result').innerText = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Bulk STK Push</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    textarea, input { width: 100%; margin-top: 10px; padding: 10px; }
    button { margin-top: 10px; padding: 12px; width: 100%; }
  </style>
</head>
<body>
  <h2>Bulk STK Push (MegaPay)</h2>

  <label>Phone Numbers (one per line)</label>
  <textarea id="numbers"></textarea>

  <label>Amount</label>
  <input type="number" id="amount" />

  <label>Reference (appears on STK)</label>
  <input type="text" id="reference" placeholder="e.g. Order123" />

  <button onclick="send()">Send STK Push</button>

  <pre id="result"></pre>

<script>
async function send() {
  const numbers = document.getElementById('numbers').value
    .split('\n')
    .map(n => n.trim())
    .filter(n => n);

  const amount = document.getElementById('amount').value;
  const reference = document.getElementById('reference').value;

  const res = await fetch('/send-bulk', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ numbers, amount, reference })
  });

  const data = await res.json();
  document.getElementById('result').innerText = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
